name: briefing

on:
  schedule:
    - cron: "0 */4 * * *" # 6 runs/day — the confirmed Global Intelligence cadence
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Pinned to a commit SHA rather than the mutable @v4/@v5 tag — this workflow runs
      # unattended on a schedule with `contents: write`, so a compromised/repointed tag would
      # get pulled and given write access with no human review on the next scheduled run.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - run: pip install feedparser requests

      - name: Build briefing.json
        run: python scripts/build_briefing.py

      - name: Commit and push
        run: |
          git config user.name "gi-briefing"
          git config user.email "actions@users.noreply.github.com"
          git add data/briefing.json
          git diff --cached --quiet || git commit -m "briefing: $(date -u +%FT%H:%MZ)"
          git pull --rebase origin main
          git push
